      - query_metrics
      - query_logs
    expected_executed_tools:
      - query_metrics
      - query_logs
      - query_mysql_status
      - search_runbook
      - search_history_ticket
    forbidden_tools:
      - delete_pod
      - restart_database
      - execute_sql
    expected_root_keywords:
