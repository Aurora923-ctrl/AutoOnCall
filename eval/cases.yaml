  - id: pod_crashloop
    title: inventory-service Pod CrashLoopBackOff
    input: inventory-service Pod CrashLoopBackOff，重启次数快速增加
    incident:
      service_name: inventory-service
      severity: P1
      environment: prod
      symptom: Pod CrashLoopBackOff OOMKilled and restart count increasing
    alertmanager_payload:
      receiver: autooncall
      status: firing
      commonLabels:
        environment: prod
        cluster: prod-a
      alerts:
        - status: firing
          fingerprint: fp-golden-k8s-crashloop-oom
          labels:
            alertname: KubePodCrashLooping
            service: inventory-service
            severity: critical
            namespace: prod
            pod: inventory-service-7f8d9c-abc12
          annotations:
            summary: inventory-service Pod CrashLoopBackOff with OOMKilled last state
            description: pod restarts=12; status=CrashLoopBackOff; last_state=OOMKilled; memory near limit
            runbook: aiops-docs/k8s_crashloop_oom.md
          startsAt: "2026-07-06T10:10:00Z"
          generatorURL: "https://prometheus.example/graph?g0.expr=kube_pod_container_status_restarts_total"
    golden:
      diagnosis_needs_approval: false
      remediation_change_requires_approval: true
      evidence_mode: offline_fixture
      source_boundary: K8s CrashLoop/OOMKilled is an offline golden regression case in the default interview stack, not live container-backed evidence.
      evidence_tools:
        - query_k8s_status
        - query_logs
        - query_metrics
      required_output_signals:
        query_k8s_status:
          pods.0.status:
            contains: CrashLoopBackOff
          pods.0.restarts:
            gte: 10
          events.0.reason:
            contains: OOMKilled
    expected_tools:
      - query_k8s_status
      - query_logs
      - query_metrics
      - search_runbook
    expected_tool_order_prefix:
      - query_k8s_status
      - query_logs
      - query_metrics
    expected_executed_tools:
      - query_k8s_status
      - query_logs
      - query_metrics
      - search_runbook
    forbidden_tools:
      - delete_pod
      - restart_database
      - execute_sql
    expected_root_keywords:
      - Kubernetes
      - Pod
    expected_risk_policy: allow
    expected_needs_approval: false
    expected_report_status: completed
    min_evidence_count: 4
    min_confidence: 0.5
    report_must_contain:
      - Kubernetes
      - Pod
      - 工具调用

