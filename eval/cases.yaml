cases:
  - id: redis_maxclients_timeout
    title: order-service Redis maxclients exhausted
    input: order-service 出现 Redis connection timeout，接口 5xx 上升，怀疑 maxclients 耗尽
    incident:
      service_name: order-service
      severity: P1
      environment: prod
      symptom: Redis connection timeout and 5xx spike
    alertmanager_payload:
      receiver: autooncall
      status: firing
      commonLabels:
        environment: prod
        cluster: prod-a
      alerts:
        - status: firing
          fingerprint: fp-golden-redis-maxclients
          labels:
            alertname: RedisMaxClientsNearLimit
            service: order-service
            severity: critical
            redis_instance: redis-cluster-prod
          annotations:
            summary: order-service Redis connected_clients is above 99% of maxclients
            description: Redis connection timeout and 5xx spike; connected_clients=9940 maxclients=10000 blocked_clients=37
            runbook: aiops-docs/redis_maxclients.md
          startsAt: "2026-07-06T10:00:00Z"
          generatorURL: "https://prometheus.example/graph?g0.expr=redis_connected_clients"
    golden:
      diagnosis_needs_approval: false
      remediation_change_requires_approval: true
      required_live_sources:
        query_redis_status: redis_info
        query_metrics: prometheus
        query_logs: loki
      evidence_tools:
        - query_redis_status
        - query_metrics
        - query_logs
      required_output_signals:
        query_redis_status:
          connected_clients:
            gte: 9900
          maxclients:
            gte: 10000
          client_usage_ratio:
            gte: 0.99
          blocked_clients:
            gte: 1
    expected_tools:
      - query_metrics
      - query_logs
      - query_redis_status
      - search_runbook
      - search_history_ticket
      - suggest_remediation
    expected_tool_order_prefix:
      - query_redis_status
      - query_metrics
      - query_logs
    expected_executed_tools:
      - query_metrics
      - query_logs
      - query_redis_status
      - search_runbook
      - search_history_ticket
    forbidden_tools:
      - delete_pod
      - restart_database
      - execute_sql
    expected_root_keywords:
      - Redis
      - maxclients
    expected_risk_policy: allow
    expected_needs_approval: false
    expected_report_status: completed
    min_evidence_count: 5
    min_confidence: 0.5
    report_must_contain:
      - Redis
      - connected_clients
      - redis_postmortem.pdf
      - tickets.csv
      - redis_postmortem.pdf
      - tickets.csv
      - 工具调用

  - id: mysql_slow_query_latency
    title: payment-service MySQL slow query latency
    input: payment-service 接口响应慢，日志出现 MySQL 慢查询和连接池等待
    incident:
      service_name: payment-service
      severity: P2
      environment: prod
      symptom: MySQL slow query and connection pool waiting
    alertmanager_payload:
      receiver: autooncall
      status: firing
      commonLabels:
        environment: prod
        cluster: prod-a
      alerts:
        - status: firing
          fingerprint: fp-golden-mysql-slow-query
          labels:
            alertname: MySQLSlowQueryLatency
            service: payment-service
            severity: warning
            mysql_instance: payment-mysql
          annotations:
            summary: payment-service p95 latency high with MySQL slow query and pool waiting
            description: slow query avg_ms=920 count=18; active connections=188/200; pool_waiting=6
            runbook: aiops-docs/mysql_slow_query.md
          startsAt: "2026-07-06T10:05:00Z"
          generatorURL: "https://prometheus.example/graph?g0.expr=mysql_slow_queries"
    golden:
      diagnosis_needs_approval: false
      remediation_change_requires_approval: true
      required_live_sources:
        query_mysql_status: mysql
        query_metrics: prometheus
        query_logs: loki
        search_history_ticket: ticket_api
      evidence_tools:
        - query_mysql_status
        - query_metrics
        - query_logs
      required_output_signals:
        query_mysql_status:
          slow_queries.0.avg_ms:
            gte: 900
          connections.active:
            gte: 180
          connections.max:
            gte: 200
          connections.pool_waiting:
            gte: 1
    expected_tools:
      - query_metrics
      - query_logs
      - query_mysql_status
      - search_runbook
      - search_history_ticket
      - suggest_remediation
    expected_tool_order_prefix:
