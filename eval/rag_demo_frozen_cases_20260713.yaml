schema_version: "1.0"
dataset_version: "2026.07.13-demo-freeze-candidate"
status: candidate
frozen_at: "2026-07-13"
description: >
  Candidate case freeze for the five-minute RAG demonstration. Case selection and
  claim-to-chunk decisions are frozen; retrieval and prompt tuning must not be
  changed to improve these cases.
source_case_set: eval/ragas_stage3_core_cases.yaml
source_case_set_sha256: 365F2C6FEC8A8DD4F876962A9731F2CDD8AF6F7D48D4038D7E254EA608BF3817
source_runtime_artifact: logs/ragas_full_runtime_core_retrieval_polished_summary.json
