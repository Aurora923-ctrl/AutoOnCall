name: Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: Lint, Test, Eval
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Type check
        run: make type-check

      - name: Security scan
        run: make security

      - name: Tests
        run: make test-quick

      - name: AIOps eval
        run: make eval

      - name: RAG eval
        run: make eval-rag

      - name: Safe-change eval
        run: make eval-change

      - name: Hygiene check
        run: make hygiene-check
