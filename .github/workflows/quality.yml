name: Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.24"
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Install frontend quality tooling
        run: npm ci

      - name: Verify quality gate
        run: make verify PYTHON=.venv/bin/python
