groups:
  - name: autooncall-full-stack
    rules:
      - alert: AutoOnCallHighErrorRateDemo
        expr: autooncall_http_error_rate > 0.05
        for: 30s
        labels:
          severity: warning
          service: order-service
          environment: sandbox
        annotations:
          summary: "order-service error rate is high"
          description: "Sandbox demo alert used by AutoOnCall AIOps."

      - alert: AutoOnCallHighLatencyDemo
        expr: autooncall_http_p95_latency_ms > 1000
        for: 30s
        labels:
          severity: critical
          service: order-service
          environment: sandbox
        annotations:
          summary: "order-service p95 latency is high"
          description: "Sandbox demo latency alert used by AutoOnCall AIOps."
