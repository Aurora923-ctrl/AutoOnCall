global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: autooncall-metrics-exporter
    static_configs:
      - targets:
          - metrics-exporter:9108

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
